version: "3.8"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: decision_backend
    restart: unless-stopped
    environment:
      APP_ENV: docker
      APP_DEBUG: "0"
      POSTGRES_DSN: postgresql://decision_user:decision_pass@postgres:5432/decision_theory
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: ["gunicorn", "-b", "0.0.0.0:8000", "-w", "2", "--timeout", "120", "--reload", "run:app"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:16
    container_name: decision_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: decision_theory
      POSTGRES_USER: decision_user
      POSTGRES_PASSWORD: decision_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decision_user -d decision_theory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data: