version: "3.8"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: decision_backend
    restart: unless-stopped
    environment:
      APP_ENV: docker
      APP_DEBUG: "0"
      MONGO_URI: mongodb://mongo:27017/decision_theory
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
    depends_on:
      mongo:
        condition: service_healthy
    command: ["gunicorn", "-b", "0.0.0.0:8000", "-w", "2", "--timeout", "120", "--reload", "run:app"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mongo:
    image: mongo:7
    container_name: decision_mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data: