version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: decision_api
    restart: unless-stopped
    environment:
      APP_ENV: docker
      APP_DEBUG: "0"
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: decision_theory
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: decision_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data: